<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1115">
  <title>Triage · content-hoarder</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/theme.js"></script>
</head>
<body data-page="triage">
  <header class="topbar triage-bar">
    <a class="btn ghost" href="/">&larr;&nbsp;Browse</a>
    <a class="btn ghost" href="/reddit">Reddit</a>
    <span id="progress" class="progress"></span>
    <div class="bar-right">
      <button type="button" class="icon-btn theme-toggle" data-theme-toggle
              aria-label="Switch to light theme" title="Switch to light theme">&#9790;</button>
      <button id="undo-btn" class="btn ghost" type="button" disabled>&#8630;&nbsp;Undo</button>
      <select id="source-filter" class="src-filter" title="Limit to source">
        <option value="">all sources</option>
      </select>
      <div class="menu">
        <button id="menu-btn" class="icon-btn" type="button" aria-label="Settings"
                aria-haspopup="true" aria-expanded="false">&#8943;</button>
        <div id="menu-pop" class="menu-pop" hidden role="menu">
          <span class="menu-label">Items per batch</span>
          <div class="chip-row" id="batch-chips">
            <button class="chip" data-batch="10" type="button">10</button>
            <button class="chip" data-batch="20" type="button">20</button>
            <button class="chip" data-batch="30" type="button">30</button>
            <button class="chip" data-batch="50" type="button">50</button>
          </div>
          <div id="ru-pop" class="ru-pop" hidden>
            <span class="menu-label">Reddit unsave</span>
            <p id="ru-pop-status" class="ru-pop-status"></p>
            <button id="ru-sync-triage" class="chip" type="button"
                    title="Unsave the queued items on Reddit (drains the unsave queue)">Unsave queued</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="triage-main" class="triage-main">
    <div id="card-stack" class="card-stack"><!-- current card injected here --></div>
    <div id="triage-empty" class="triage-empty" hidden>
      <div class="triage-empty-icon" aria-hidden="true">&#10003;</div>
      <p class="triage-empty-title">Page cleared</p>
      <p class="triage-empty-sub" id="triage-empty-sub"></p>
      <div class="triage-empty-acts">
        <button id="next-batch" class="btn primary">Deal another batch</button>
        <a class="btn ghost" href="/">That&rsquo;s enough for now</a>
      </div>
    </div>
    <div id="actions" class="triage-actions">
      <button class="act done" data-action="done" title="Done (← or Y)">
        <span class="act-ic" data-ico="done" aria-hidden="true"></span>
        <span class="act-label">Done</span><kbd class="act-key">Y</kbd>
      </button>
      <button class="act keep" data-action="keep" title="Keep (S)">
        <span class="act-ic" data-ico="keep" aria-hidden="true"></span>
        <span class="act-label">Keep</span><kbd class="act-key">S</kbd>
      </button>
      <button class="act archive" data-action="archived" title="Archive (→ or E)">
        <span class="act-ic" data-ico="archive" aria-hidden="true"></span>
        <span class="act-label">Archive</span><kbd class="act-key">E</kbd>
      </button>
    </div>
    <div class="triage-hint">Swipe → archive · ← done · or use the buttons / S&nbsp;E&nbsp;Y keys</div>
  </main>

  <div id="shortcut-modal" class="modal" hidden>
    <div class="modal-box shortcut-box">
      <button class="modal-close" id="shortcut-close" type="button">&times;</button>
      <h2>Keyboard shortcuts</h2>
      <div class="shortcut-list">
        <div class="shortcut-row"><span><kbd>S</kbd></span><span>Keep</span></div>
        <div class="shortcut-row"><span><kbd>E</kbd> / <kbd>&rarr;</kbd></span><span>Archive</span></div>
        <div class="shortcut-row"><span><kbd>Y</kbd> / <kbd>&larr;</kbd></span><span>Done</span></div>
        <div class="shortcut-row"><span><kbd>U</kbd> / <kbd>Z</kbd></span><span>Undo</span></div>
        <div class="shortcut-row"><span><kbd>?</kbd></span><span>Toggle this sheet</span></div>
      </div>
      <p class="shortcut-note">Swipe right to archive and left to mark done.</p>
    </div>
  </div>

  <div id="media-modal" class="modal" hidden>
    <div class="modal-box media-box">
      <button class="modal-close" id="media-close" type="button">&times;</button>
      <div id="media-body"></div>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>
  <script src="/static/haptics.js"></script>
  <script type="module" src="/static/triage.js"></script>
</body>
</html>
