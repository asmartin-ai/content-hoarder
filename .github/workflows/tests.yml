name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # pyproject: requires-python >=3.12
      - uses: actions/setup-node@v4
        with:
          node-version: "20"       # so the node-driven tests run instead of skipping
      - run: pip install -e ".[dev]"   # flask + pytest (pyproject optional-deps: dev)
      - run: python -m pytest          # testpaths=tests, addopts=-q (pyproject)
